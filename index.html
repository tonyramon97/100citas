</div>

<div id="view-completed">

  {id:97,title:"Clase de defensa personal",cat:"Aventura",desc:"Tomen una clase basica de defensa personal o artes marciales.",tags:["Deporte","Aprendizaje"]},
  {id:98,title:"Noche de retroalimentacion positiva",cat:"Romantico",desc:"Haganse turnos para decir 10 cosas que aman y admiran del otro.",tags:["Profundo","Casa"]},
  {id:99,title:"Recrear su primera cita",cat:"Romantico",desc:"Vuelvan al lugar de su primera cita y revivan ese momento especial.",tags:["Romantico","Recuerdos"]},
  {id:100,title:"Celebracion de las 100 citas!",cat:"Hito",desc:"Lo lograron! Planeen una celebracion especial que ambos recuerden para siempre.",tags:["Celebracion","Especial"]}
];

var CATS = ["Todas","Romantico","Aventura","Divertido","Naturaleza","Cultural","Creatividad","Bienestar","Relajante","Hito"];
var activeCat = "Todas";
var currentId = 1;
var done = [];
var activeTab = "explore";

function filtered() {
  if (activeCat === "Todas") return CITAS;
  return CITAS.filter(function(c) { return c.cat === activeCat; });
}

function showCita(cita) {
  currentId = cita.id;
  document.getElementById("cita-num").textContent = "#" + (cita.id < 10 ? "0" : "") + cita.id;
  document.getElementById("cita-cat").textContent = cita.cat;
  document.getElementById("cita-title").textContent = cita.title;
  document.getElementById("cita-desc").textContent = cita.desc;
  var tagRow = document.getElementById("cita-tags");
  tagRow.innerHTML = cita.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("");
  var isDone = done.indexOf(cita.id) !== -1;
  var btn = document.getElementById("btn-done");
  btn.textContent = isDone ? "Ya la hicieron!" : "Marcar como hecha";
  btn.className = "btn-done" + (isDone ? " is-done" : "");
  updateProgress();
}

function randomCita() {
  var pool = filtered();
  var notDone = pool.filter(function(c) { return done.indexOf(c.id) === -1; });
  var use = notDone.length > 0 ? notDone : pool;
  var pick = use[Math.floor(Math.random() * use.length)];
  showCita(pick);
}

function toggleDone() {
  var idx = done.indexOf(currentId);
  if (idx === -1) { done.push(currentId); }
  else { done.splice(idx, 1); }
  try { localStorage.setItem("citas_done", JSON.stringify(done)); } catch(e) {}
  var cita = CITAS.filter(function(c) { return c.id === currentId; })[0];
  showCita(cita);
  if (activeTab === "completed") renderCompleted();
}

function updateProgress() {
  var pct = Math.round((done.length / 100) * 100);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-text").textContent = done.length + " de 100 completadas";
}

function renderFilters() {
  var el = document.getElementById("filters");
  el.innerHTML = CATS.map(function(c) {
    return '<button class="chip' + (c === activeCat ? " active" : "") + '" onclick="setFilter(\'' + c + '\')">' + c + '</button>';
  }).join("");
}

function setFilter(cat) {
  activeCat = cat;
  renderFilters();
  randomCita();
}

function switchTab(t) {
  activeTab = t;
  document.getElementById("view-explore").style.display = t === "explore" ? "block" : "none";
  document.getElementById("view-completed").style.display = t === "completed" ? "block" : "none";
  document.getElementById("tab-explore").className = "tab" + (t === "explore" ? " active" : "");
  document.getElementById("tab-completed").className = "tab" + (t === "completed" ? " active" : "");
  if (t === "completed") renderCompleted();
}

function renderCompleted() {
  var el = document.getElementById("comp-list");
  if (done.length === 0) {
    el.innerHTML = '<div class="empty">Aun no han completado ninguna cita.<br><br>Vayan a explorar y marquen su primera aventura!</div>';
    return;
  }
  el.innerHTML = done.map(function(id) {
    var c = CITAS.filter(function(x) { return x.id === id; })[0];
    return '<div class="comp-item"><div class="comp-check">&#10003;</div><div><span class="comp-cat">' + c.cat + '</span>' + c.title + '</div></div>';
  }).join("");
}

window.onload = function() {
  try { done = JSON.parse(localStorage.getItem("citas_done") || "[]"); } catch(e) { done = []; }
  try {
    if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
      document.getElementById("install-banner").style.display = "block";
    }
  } catch(e) {}
  renderFilters();
  randomCita();
};
</script>
</body>
</html>
