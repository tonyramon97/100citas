<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Scroll Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: sans-serif;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #fff;
}

#log {
  position: fixed;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 8px;
  z-index: 999;
  pointer-events: none;
}

.fixed-header {
  flex-shrink: 0;
  background: #78534c;
  color: white;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
}

#scrollable {
  flex: 1;
  min-height: 0;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  background: #fcf9f8;
  padding: 16px;
}

.fixed-bottom {
  flex-shrink: 0;
  background: #eee;
  padding: 16px;
  text-align: center;
  font-size: 13px;
}

.item {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  font-size: 15px;
}

/* Pasos de prueba */
#step { font-weight: bold; color: #78534c; margin-bottom: 8px; font-size: 13px; }
</style>
</head>
<body>

<div id="log">scroll: 0px</div>

<div class="fixed-header">🧪 Test de Scroll — Safari PWA</div>

<div id="scrollable">
  <div id="step">PASO 1: ¿Puedes hacer scroll aquí? → Toca este área y desliza</div>

  <div class="item">📌 Item 1 — si ves esto, el contenido cargó</div>
  <div class="item">📌 Item 2</div>
  <div class="item">📌 Item 3</div>
  <div class="item">📌 Item 4</div>
  <div class="item">📌 Item 5</div>
  <div class="item">📌 Item 6</div>
  <div class="item">📌 Item 7</div>
  <div class="item">📌 Item 8</div>
  <div class="item">📌 Item 9</div>
  <div class="item">📌 Item 10 — si llegaste aquí ¡el scroll funciona!</div>
</div>

<div class="fixed-bottom">Barra inferior fija</div>

<script>
const log = document.getElementById('log');
const scrollable = document.getElementById('scrollable');

// Mostrar posición de scroll en tiempo real
scrollable.addEventListener('scroll', () => {
  log.textContent = 'scroll: ' + Math.round(scrollable.scrollTop) + 'px ✓';
}, { passive: true });

// Reportar si los touches llegan
scrollable.addEventListener('touchstart', () => {
  log.textContent = 'touch detectado...';
}, { passive: true });
</script>
</body>
</html>
