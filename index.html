<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Scroll Test 2 — Canvas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: sans-serif;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #fcf9f8;
}
/* Canvas igual que en tu app */
#bg-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
  touch-action: none;
  z-index: 0; opacity: 0.35;
}
.fixed-header {
  flex-shrink: 0;
  background: #78534c;
  color: white;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  position: relative; z-index: 1;
}
#scrollable {
  flex: 1;
  min-height: 0;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  position: relative; z-index: 1;
}
.fixed-bottom {
  flex-shrink: 0;
  background: #eee;
  padding: 16px;
  text-align: center;
  font-size: 13px;
  position: relative; z-index: 1;
}
.item {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  font-size: 15px;
}
#log {
  position: fixed; top: 8px; right: 8px;
  background: rgba(0,0,0,0.75); color: #fff;
  font-size: 11px; padding: 6px 10px; border-radius: 8px;
  z-index: 999; pointer-events: none;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="log">esperando...</div>

<div class="fixed-header">🧪 Test 2 — Con Canvas WebGL</div>

<div id="scrollable">
  <div class="item" style="background:#fff3cd">⚠️ Este test agrega el canvas WebGL de tu app. Si aquí el scroll falla, el canvas es el culpable.</div>
  <div class="item">📌 Item 1</div>
  <div class="item">📌 Item 2</div>
  <div class="item">📌 Item 3</div>
  <div class="item">📌 Item 4</div>
  <div class="item">📌 Item 5</div>
  <div class="item">📌 Item 6</div>
  <div class="item">📌 Item 7</div>
  <div class="item">📌 Item 8</div>
  <div class="item">📌 Item 9</div>
  <div class="item">📌 Item 10 — ¿llegaste aquí?</div>
</div>

<div class="fixed-bottom">Barra inferior</div>

<script>
const log = document.getElementById('log');
const scrollable = document.getElementById('scrollable');

scrollable.addEventListener('scroll', () => {
  log.textContent = 'scroll: ' + Math.round(scrollable.scrollTop) + 'px ✓';
}, { passive: true });
scrollable.addEventListener('touchstart', () => {
  log.textContent = 'touch detectado...';
}, { passive: true });

// Canvas WebGL — igual que tu app original
(function(){
  const canvas = document.getElementById('bg-canvas');
  const gl = canvas.getContext('webgl', { powerPreference: 'low-power' });
  if (!gl) { log.textContent = 'WebGL no disponible'; return; }
  function sync() {
    const w = window.innerWidth, h = window.innerHeight;
    if (canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
  }
  sync();
  window.addEventListener('resize', sync);
  const vs=`attribute vec2 p;varying vec2 v;void main(){v=p*.5+.5;gl_Position=vec4(p,0,1);}`;
  const fs=`precision mediump float;varying vec2 v;uniform float t;void main(){
    float n=sin(v.x*2.+t*.4)*cos(v.y*2.+t*.25);
    vec3 c=mix(vec3(.988,.976,.973),vec3(.965,.949,.945),v.y+n*.08);
    c=mix(c,vec3(.729,.616,.588),max(n*.04,0.));
    gl_FragColor=vec4(c,1.);}`;
  function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const prog=gl.createProgram();
  gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const pos=gl.getAttribLocation(prog,'p');
  gl.enableVertexAttribArray(pos);gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
  const uT=gl.getUniformLocation(prog,'t');
  function draw(ts){
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform1f(uT,ts*.001);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  log.textContent = 'WebGL activo — toca para probar scroll';
})();
</script>
</body>
</html>
